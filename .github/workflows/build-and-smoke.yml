name: build-and-smoke

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libeigen3-dev libcgal-dev libgmp-dev libmpfr-dev python3-pip
          python3 -m pip install --break-system-packages -r requirements.txt

      - name: Configure and build all apps
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run C++ smoke cases
        env:
          KFBIM_CIRCLE_EXT_TRACE_MAX_ITER: "30"
          KFBIM_CIRCLE_EXT_TRACE_RESTART: "30"
          KFBIM_CIRCLE_EXT_TRACE_TOL: "1e-7"
          KFBIM_EXT_TRACE_MAX_ITER: "40"
          KFBIM_EXT_TRACE_RESTART: "30"
          KFBIM_EXT_TRACE_TOL: "1e-7"
          KFBIM_HJET_MAX_ITER: "40"
          KFBIM_HJET_RESTART: "30"
          KFBIM_HJET_TOL: "1e-7"
          KFBIM_PYJET_MAX_ITER: "40"
          KFBIM_PYJET_RESTART: "30"
          KFBIM_PYJET_TOL: "1e-7"
          KFBIM_PYJET_DOF_MODE: uniform_midpoint
          KFBIM_PYJET_RESTRICT_MODE: compare
        run: |
          ./build/apps/neumann_exterior_trace_circle_2d 24
          ./build/apps/neumann_exterior_trace_lshape_2d 24
          ./build/apps/neumann_harmonic_jet_case_2d ellipse 24
          ./build/apps/neumann_harmonic_jet_python_compatible_2d ellipse 24
          ./build/apps/neumann_exterior_zero_trace_3d all 16
          main_preset_output="$(
            env -u KFBIM_PYJET_DOF_MODE \
                -u KFBIM_PYJET_SPREAD_MODE \
                -u KFBIM_PYJET_RESTRICT_MODE \
                -u KFBIM_PYJET_UNIFORM_DOF_RATIO \
                -u KFBIM_PYJET_CUBIC_SPREAD_NEIGHBORS \
                -u KFBIM_PYJET_CUBIC_SPREAD_DERIVATIVE_NEIGHBORS \
                ./build/apps/neumann_harmonic_jet_python_compatible_2d ellipse 24
          )"
          printf '%s\n' "$main_preset_output"
          printf '%s\n' "$main_preset_output" | grep -Fq \
            'spread_mode=cubic_harmonic dof_mode=uniform_midpoint restrict_mode=biquadratic_quadratic_two_layer'
          printf '%s\n' "$main_preset_output" | grep -Fq \
            'uniform_dof_ratio=7.500000e-01'
          printf '%s\n' "$main_preset_output" | grep -Fq \
            'cubic_spread_neighbors=4 cubic_spread_derivative_neighbors=3'
          printf '%s\n' "$main_preset_output" | grep -Fq \
            'restrict_jump_extension=linear_taylor restrict_jump_degree=1'
          printf '%s\n' "$main_preset_output" | grep -Fq \
            'converged=yes'
          dirichlet_output="$(
            KFBIM_PYJET_DOF_MODE=uniform_midpoint \
            KFBIM_PYJET_RESTRICT_MODE=biquadratic_quadratic_two_layer \
              ./build/apps/dirichlet_harmonic_jet_python_compatible_2d circle 24
          )"
          printf '%s\n' "$dirichlet_output"
          printf '%s\n' "$dirichlet_output" | grep -Fq \
            'bvp=dirichlet trace_target=interior_residual_zero'
          printf '%s\n' "$dirichlet_output" | grep -Fq \
            'dirichlet_formulation=normal_jump_first_kind'
          printf '%s\n' "$dirichlet_output" | grep -Fq \
            'converged=yes'
          dirichlet_boundary_res="$(
            printf '%s\n' "$dirichlet_output" \
              | sed -n 's/.* boundary_res=\([^ ]*\).*/\1/p' | head -n 1
          )"
          dirichlet_linf="$(
            printf '%s\n' "$dirichlet_output" \
              | sed -n 's/.* Linf=\([^ ]*\).*/\1/p' | head -n 1
          )"
          awk -v b="$dirichlet_boundary_res" -v e="$dirichlet_linf" \
            'BEGIN { exit !(b != "" && e != "" && b < 1e-6 && e < 5e-2) }'
          second_kind_output="$(
            KFBIM_PYJET_DOF_MODE=uniform_midpoint \
            KFBIM_PYJET_RESTRICT_MODE=biquadratic_quadratic_two_layer \
            KFBIM_PYJET_DIRICHLET_FORMULATION=value_jump_second_kind \
              ./build/apps/dirichlet_harmonic_jet_python_compatible_2d circle 24
          )"
          printf '%s\n' "$second_kind_output"
          printf '%s\n' "$second_kind_output" | grep -Fq \
            'dirichlet_formulation=value_jump_second_kind'
          printf '%s\n' "$second_kind_output" | grep -Fq \
            'converged=yes'
          second_boundary_res="$(
            printf '%s\n' "$second_kind_output" \
              | sed -n 's/.* boundary_res=\([^ ]*\).*/\1/p' | head -n 1
          )"
          second_linf="$(
            printf '%s\n' "$second_kind_output" \
              | sed -n 's/.* Linf=\([^ ]*\).*/\1/p' | head -n 1
          )"
          awk -v b="$second_boundary_res" -v e="$second_linf" \
            'BEGIN { exit !(b != "" && e != "" && b < 1e-6 && e < 1e-1) }'
          formulation_compare_output="$(
            KFBIM_PYJET_DOF_MODE=uniform_midpoint \
            KFBIM_PYJET_RESTRICT_MODE=biquadratic_quadratic_two_layer \
            KFBIM_PYJET_DIRICHLET_FORMULATION=compare \
              ./build/apps/dirichlet_harmonic_jet_python_compatible_2d circle 24
          )"
          printf '%s\n' "$formulation_compare_output" | grep -Fq \
            'dirichlet_formulation=normal_jump_first_kind'
          printf '%s\n' "$formulation_compare_output" | grep -Fq \
            'dirichlet_formulation=value_jump_second_kind'
          printf '%s\n' "$formulation_compare_output" | grep -Fq \
            'dirichlet_formulation=normal_jump_second_kind'
          normal_second_kind_output="$(
            KFBIM_PYJET_DOF_MODE=uniform_midpoint \
            KFBIM_PYJET_RESTRICT_MODE=biquadratic_quadratic_two_layer \
            KFBIM_PYJET_DIRICHLET_FORMULATION=normal_jump_second_kind \
              ./build/apps/dirichlet_harmonic_jet_python_compatible_2d lshape 24
          )"
          printf '%s\n' "$normal_second_kind_output"
          printf '%s\n' "$normal_second_kind_output" | grep -Fq \
            'dirichlet_formulation=normal_jump_second_kind'
          printf '%s\n' "$normal_second_kind_output" | grep -Fq \
            'converged=yes'
          normal_second_exterior="$(
            printf '%s\n' "$normal_second_kind_output" \
              | sed -n 's/.* exterior_normal=\([^ ]*\).*/\1/p' | head -n 1
          )"
          normal_second_route="$(
            printf '%s\n' "$normal_second_kind_output" \
              | sed -n 's/.* normal_route_mismatch=\([^ ]*\).*/\1/p' | head -n 1
          )"
          normal_second_linf="$(
            printf '%s\n' "$normal_second_kind_output" \
              | sed -n 's/.* Linf=\([^ ]*\).*/\1/p' | head -n 1
          )"
          awk -v n="$normal_second_exterior" \
              -v r="$normal_second_route" -v e="$normal_second_linf" \
            'BEGIN { exit !(n != "" && r != "" && e != "" && n < 1e-7 && r < 1e-10 && e < 5e-2) }'
          degree_compare_output="$(
            KFBIM_PYJET_DOF_MODE=uniform_midpoint \
            KFBIM_PYJET_RESTRICT_MODE=degree_compare \
            KFBIM_PYJET_DIRICHLET_FORMULATION=normal_jump_second_kind \
              ./build/apps/dirichlet_harmonic_jet_python_compatible_2d lshape 64
          )"
          printf '%s\n' "$degree_compare_output" | grep -Fq \
            'restrict_mode=bicubic_quadratic'
          printf '%s\n' "$degree_compare_output" | grep -Fq \
            'restrict_mode=biquadratic_cubic'
          test "$(printf '%s\n' "$degree_compare_output" \
            | grep -c 'converged=yes')" -eq 4
          if KFBIM_PYJET_DIRICHLET_FORMULATION=invalid \
              ./build/apps/dirichlet_harmonic_jet_python_compatible_2d circle 24; then
            echo "invalid Dirichlet formulation unexpectedly succeeded" >&2
            exit 1
          fi
          KFBIM_PYJET_DIRICHLET_FORMULATION=invalid \
            ./build/apps/neumann_harmonic_jet_python_compatible_2d circle 24
          lshape_output="$(
            env -u KFBIM_PYJET_DOF_MODE \
                -u KFBIM_PYJET_SPREAD_MODE \
                -u KFBIM_PYJET_RESTRICT_MODE \
                -u KFBIM_PYJET_UNIFORM_DOF_RATIO \
                KFBIM_PYJET_MAX_ITER=100 \
                ./build/apps/neumann_harmonic_jet_python_compatible_2d lshape 24
          )"
          printf '%s\n' "$lshape_output"
          printf '%s\n' "$lshape_output" | grep -Fq \
            '[run] geometry=lshape N=24 dof_mode=uniform_midpoint restrict_mode=biquadratic_quadratic_two_layer'
          printf '%s\n' "$lshape_output" | grep -Fq \
            'spread_mode=cubic_harmonic'
          printf '%s\n' "$lshape_output" | grep -Fq \
            'lshape_neighbor_policy=hybrid_4plus3_corner_cauchy_fit'
          printf '%s\n' "$lshape_output" | grep -Fq \
            'lshape_corner_policy=edge_midpoints'
          printf '%s\n' "$lshape_output" | grep -Fq \
            'converged=yes'
          printf '%s\n' "$lshape_output" | grep -Fq \
            'hybrid_full_fit_dofs=24'
          printf '%s\n' "$lshape_output" | grep -Fq \
            'corner_fit_degree=3 corner_fit_neighbors=5 corner_fit_derivative_neighbors=4'
          quadratic_all_three_output="$(
            KFBIM_PYJET_SPREAD_MODE=quadratic_harmonic \
            KFBIM_PYJET_RESTRICT_MODE=bicubic_cubic \
            ./build/apps/neumann_harmonic_jet_python_compatible_2d circle 24
          )"
          printf '%s\n' "$quadratic_all_three_output"
          printf '%s\n' "$quadratic_all_three_output" | grep -Fq \
            'quadratic_spread_neighbors=3 quadratic_spread_derivative_neighbors=3'
          printf '%s\n' "$quadratic_all_three_output" | grep -Fq \
            'quadratic_normal_sampling=all_three'
          printf '%s\n' "$quadratic_all_three_output" | grep -Fq \
            'converged=yes'
          quadratic_symmetric_output="$(
            KFBIM_PYJET_SPREAD_MODE=quadratic_harmonic \
            KFBIM_PYJET_RESTRICT_MODE=bicubic_cubic \
            KFBIM_PYJET_QUADRATIC_SPREAD_DERIVATIVE_NEIGHBORS=2 \
            ./build/apps/neumann_harmonic_jet_python_compatible_2d circle 24
          )"
          printf '%s\n' "$quadratic_symmetric_output" | grep -Fq \
            'quadratic_normal_sampling=adjacent_symmetric'
          printf '%s\n' "$quadratic_symmetric_output" | grep -Fq \
            'converged=yes'
          ./build/apps/transmission_center_perturb_2d --samples 1 --levels 24 --jitter 0.01 --out output/smoke_transmission_center
          ./build/apps/shape_opt_transmission_2d --N 24 --iters 1 --save-every 1 --out output/smoke_shape_opt

      - name: Run both visualization apps
        env:
          MPLBACKEND: Agg
        run: |
          python3 -m py_compile apps/visualize_shape_opt_2d.py apps/visualize_transmission_center_perturb_2d.py
          python3 apps/visualize_shape_opt_2d.py output/smoke_shape_opt
          python3 apps/visualize_transmission_center_perturb_2d.py output/smoke_transmission_center
